<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشر - تسجيل طلب</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .sidebar { background: #3a2016; }
        .active-tab { background: rgba(255,255,255,0.1); border-right: 4px solid #fbbf24; }
        .login-bg { background: linear-gradient(135deg, #0f1f3d 0%, #3a2016 50%, #1e3a6e 100%); min-height: 100vh; }
        .loader-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .custom-checkbox { width: 1.25rem; height: 1.25rem; accent-color: #3a2016; cursor: pointer; }
    </style>
</head>
<body>
<div id="app" class="min-h-screen flex">

    <div v-if="!currentUser" class="login-bg w-full flex items-center justify-center p-4">
        <div class="w-full max-w-md">
            <div class="text-center mb-10">
                <div class="w-28 h-28 bg-white rounded-3xl mx-auto mb-6 flex items-center justify-center p-3 shadow-2xl overflow-hidden">
                    <img src="logo1.png" alt="Logo" class="w-full h-full object-contain" onerror="this.src='https://i.ibb.co/68vD84D/logo1.png'">
                </div>
                <h1 class="text-4xl font-black text-white">منشر</h1>
                <p class="text-blue-300 text-sm mt-2 tracking-widest">نظام إدارة المبيعات</p>
            </div>
            <div class="bg-white rounded-3xl shadow-2xl p-10">
                <h2 class="text-2xl font-black text-[#3a2016] mb-8 text-center">تسجيل الدخول</h2>
                <div v-if="loginError" class="bg-red-50 border border-red-200 text-red-600 rounded-2xl p-4 mb-6 text-sm font-bold text-center">
                    {{ loginError }}
                </div>
                <div class="space-y-5">
                    <div>
                        <label class="block text-xs font-black text-gray-400 mb-2 uppercase">اسم المستخدم</label>
                        <input v-model="loginForm.username" @keyup.enter="doLogin" type="text" placeholder="أدخل اسم المستخدم" class="w-full p-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-blue-500 outline-none font-bold text-[#3a2016] transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-black text-gray-400 mb-2 uppercase">كلمة المرور</label>
                        <input v-model="loginForm.password" @keyup.enter="doLogin" type="password" placeholder="أدخل كلمة المرور" class="w-full p-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-blue-500 outline-none font-bold text-[#3a2016] transition-all">
                    </div>
                    <button @click="doLogin" :disabled="loginLoading" class="w-full bg-[#3a2016] text-white py-4 rounded-2xl font-black shadow-xl hover:bg-blue-800 transition-all hover:scale-105 active:scale-95 flex items-center justify-center gap-3 mt-2">
                        <span v-if="loginLoading" class="loader-spin inline-block w-5 h-5 border-2 border-white border-t-transparent rounded-full"></span>
                        <span>{{ loginLoading ? 'جاري التحقق...' : 'دخول' }}</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <template v-if="currentUser">
        <aside class="sidebar w-64 text-white flex flex-col fixed h-full z-50 shadow-2xl">
            <div class="p-8 text-center border-b border-white/5">
                <div class="w-24 h-24 bg-white rounded-3xl mx-auto mb-4 flex items-center justify-center p-2 shadow-xl overflow-hidden">
                    <img src="logo1.png" alt="Logo" class="w-full h-full object-contain" onerror="this.src='https://i.ibb.co/68vD84D/logo1.png'">
                </div>
                <h1 class="text-xl font-black">منشر</h1>
                <p class="text-blue-300 text-[10px] mt-1 tracking-widest font-bold uppercase">نظام إدارة المبيعات</p>
                <div class="mt-3 flex items-center justify-center gap-2">
                    <span class="text-[10px] font-black px-3 py-1 rounded-full" :class="currentUser.role === 'admin' ? 'bg-yellow-400 text-yellow-900' : 'bg-blue-700 text-blue-100'">
                        {{ currentUser.role === 'admin' ? '👑 مدير' : '👤 ' + currentUser.managerCode }}
                    </span>
                </div>
            </div>
            <nav class="flex-1 py-10 px-4 space-y-2">
                <a href="index.html" class="active-tab w-full flex items-center gap-4 px-6 py-4 rounded-xl transition-all font-bold hover:bg-white/5">
                    <i data-lucide="plus-circle" class="w-5 h-5 text-yellow-400"></i> تسجيل طلب
                </a>
                <a href="my_orders.html" class="w-full flex items-center gap-4 px-6 py-4 rounded-xl transition-all font-bold hover:bg-white/5">
                    <i data-lucide="list" class="w-5 h-5 text-yellow-400"></i> طلباتي
                </a>
                <a href="invoices.html" class="w-full flex items-center gap-4 px-6 py-4 rounded-xl transition-all font-bold hover:bg-white/5">
                    <i data-lucide="printer" class="w-5 h-5 text-yellow-400"></i> مركز الفواتير
                </a>
                <a href="archive.html" class="w-full flex items-center gap-4 px-6 py-4 rounded-xl transition-all font-bold hover:bg-white/5">
                    <i data-lucide="database" class="w-5 h-5 text-yellow-400"></i> أرشيف الطلبات العام
                </a>
                <a href="catalog.html" class="w-full flex items-center gap-4 px-6 py-4 rounded-xl transition-all font-bold hover:bg-white/5">
                    <i data-lucide="package" class="w-5 h-5 text-yellow-400"></i> المنتجات
                </a>
                <a v-if="currentUser.role === 'admin'" href="reports.html" class="w-full flex items-center gap-4 px-6 py-4 rounded-xl transition-all font-bold hover:bg-white/5">
                    <i data-lucide="pie-chart" class="w-5 h-5 text-yellow-400"></i> التقارير والإحصائيات
                </a>
            </nav>
            <div class="p-4 border-t border-white/10">
                <button @click="doLogout" class="w-full flex items-center gap-3 px-6 py-3 rounded-xl hover:bg-white/10 transition-all font-bold text-red-300 hover:text-red-200">
                    <i data-lucide="log-out" class="w-4 h-4"></i> تسجيل خروج
                </button>
            </div>
        </aside>

        <main class="flex-1 mr-64 p-8 relative min-h-screen">
            <div v-if="notification" class="fixed top-10 left-10 z-[100] p-5 rounded-2xl shadow-2xl bg-white border-l-8 flex items-center gap-4 transition-all"
                 :class="{'border-red-500 text-red-600': notification.type === 'error', 'border-green-500 text-green-600': notification.type === 'success', 'border-blue-500 text-blue-700': notification.type === 'info'}">
                <i v-if="notification.type === 'success'" data-lucide="check-circle"></i>
                <i v-else-if="notification.type === 'error'" data-lucide="alert-circle"></i>
                <i v-else data-lucide="loader" class="animate-spin"></i>
                <span class="font-black">{{ notification.msg }}</span>
            </div>

            <div v-if="syncLoading" class="fixed inset-0 bg-white/70 z-40 flex flex-col items-center justify-center backdrop-blur-sm">
                <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-[#3a2016] mb-4"></div>
                <p class="font-black text-[#3a2016]">جاري تحديث قاعدة البيانات المركزية...</p>
            </div>

            <header class="mb-10 flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div>
                    <h2 class="text-3xl font-black text-[#3a2016]">
                        <span>{{ editingOrder ? 'تعديل بيانات الطلب المحدّد' : 'تسجيل طلب مبيعات جديد' }}</span>
                    </h2>
                </div>
                <div class="flex gap-2">
                    <button @click="syncCatalogFromSheet" class="bg-[#3a2016] text-white px-6 py-3 rounded-2xl font-black flex items-center gap-2 shadow-lg hover:bg-blue-800 transition-all">
                        <i data-lucide="refresh-cw" :class="{'loader-spin': syncLoading}" class="w-4 h-4"></i>
                        تحديث قائمة المنتجات
                    </button>
                </div>
            </header>

            <section class="bg-white p-8 rounded-3xl shadow-sm border animate-in fade-in">
                <form @submit.prevent="saveOrder" class="space-y-8">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-6 gap-6 bg-blue-50/50 p-8 rounded-3xl mb-4 border border-blue-100">
                        <div class="col-span-full font-black text-[#3a2016] flex items-center gap-2 mb-2 text-lg">
                            <i data-lucide="settings"></i> إعدادات الطلب والدفع والإيصالات
                        </div>
                        <div class="space-y-1 lg:col-span-1">
                            <label class="text-[11px] font-black text-gray-400 mr-2 uppercase">رقم الطلب يدوياً</label>
                            <input v-model="orderForm.customOrderId" type="text" class="w-full p-3.5 border-2 border-transparent bg-white rounded-2xl shadow-sm focus:border-blue-500 outline-none font-bold text-center" placeholder="تلقائي">
                        </div>
                        <div class="space-y-1 lg:col-span-1">
                            <label class="text-[11px] font-black text-gray-400 mr-2 uppercase">الدفع عند الاستلام</label>
                            <div class="flex items-center gap-3 mt-2 h-[46px]" @click="orderForm.payOnDelivery = !orderForm.payOnDelivery">
                                <div class="relative inline-block w-12 h-6 rounded-full transition-colors duration-300 shadow-inner cursor-pointer"
                                     :class="orderForm.payOnDelivery ? 'bg-green-500' : 'bg-gray-300'">
                                    <div class="absolute top-1 w-4 h-4 bg-white rounded-full transition-all duration-300 shadow"
                                         :class="orderForm.payOnDelivery ? 'left-1' : 'right-1'"></div>
                                </div>
                                <span class="text-sm font-black" :class="orderForm.payOnDelivery ? 'text-green-600' : 'text-gray-500'">
                                    {{ orderForm.payOnDelivery ? 'مفعّل' : 'غير مفعّل' }}
                                </span>
                            </div>
                        </div>

                        <div class="space-y-1 lg:col-span-1">
                            <label class="text-[11px] font-black text-gray-400 mr-2 uppercase">الخصم (%)</label>
                            <input v-model.number="orderForm.discountRate" type="number" min="0" max="100" step="any" class="w-full p-3.5 border-2 border-transparent bg-white rounded-2xl shadow-sm focus:border-blue-500 outline-none font-bold text-center text-red-500" placeholder="0">
                        </div>
                        <div class="space-y-1 lg:col-span-1">
                            <label class="text-[11px] font-black text-gray-400 mr-2 uppercase">حالة الدفع</label>
                            <div class="flex items-center gap-3 mt-2 h-[46px]" @click="togglePayment">
                                <div class="relative inline-block w-12 h-6 rounded-full transition-colors duration-300 shadow-inner cursor-pointer"
                                     :class="orderForm.isPaid ? 'bg-green-500' : 'bg-gray-300'">
                                    <div class="absolute top-1 w-4 h-4 bg-white rounded-full transition-all duration-300 shadow"
                                         :class="orderForm.isPaid ? 'left-1' : 'right-1'"></div>
                                </div>
                                <span class="text-sm font-black" :class="orderForm.isPaid ? 'text-green-600' : 'text-gray-500'">
                                    {{ orderForm.isPaid ? 'مدفوع' : 'غير مدفوع' }}
                                </span>
                            </div>
                        </div>

                        <div v-if="currentUser.role === 'admin'" class="space-y-1 lg:col-span-2">
                            <label class="text-[11px] font-black text-gray-400 mr-2 uppercase">حالة الطلب في المتجر (خاص بالأدمن)</label>
                            <div class="flex items-center gap-3 mt-2 h-[46px]" @click="orderForm.orderStatus = !orderForm.orderStatus">
                                <div class="relative inline-block w-12 h-6 rounded-full transition-colors duration-300 shadow-inner cursor-pointer"
                                     :class="orderForm.orderStatus ? 'bg-blue-600' : 'bg-gray-300'">
                                    <div class="absolute top-1 w-4 h-4 bg-white rounded-full transition-all duration-300 shadow"
                                         :class="orderForm.orderStatus ? 'left-1' : 'right-1'"></div>
                                </div>
                                <span class="text-sm font-black" :class="orderForm.orderStatus ? 'text-blue-700' : 'text-gray-500'">
                                    {{ orderForm.orderStatus ? 'تم تسجيل الطلب' : 'لم يتم التسجيل' }}
                                </span>
                            </div>
                        </div>
                        <div v-else class="space-y-1 lg:col-span-2 invisible"></div>

                        <div class="space-y-1 lg:col-span-2">
                            <label class="text-[11px] font-black text-gray-400 mr-2 uppercase">رفع إيصالات الدفع (يمكن اختيار أكثر من صورة)</label>
                            <input type="file" ref="receiptInput" accept="image/*" multiple @change="handleReceiptUpload" class="w-full p-2.5 border-2 border-transparent bg-white rounded-2xl shadow-sm focus:border-blue-500 outline-none font-bold text-sm">
                        </div>

                        <div v-if="orderForm.receipts.length > 0" class="col-span-full mt-4 bg-white p-4 rounded-2xl border border-gray-100">
                            <p class="text-xs font-black text-gray-400 mb-3 uppercase">صور إيصالات الدفع المرفقة بالطلب حالياً ({{ orderForm.receipts.length }}):</p>
                            <div class="flex flex-wrap gap-4">
                                <div v-for="(img, idx) in orderForm.receipts" :key="idx" class="relative w-20 h-20 rounded-xl overflow-hidden border shadow-sm group bg-gray-50">
                                    <img :src="img" class="w-full h-full object-cover">
                                    <button type="button" @click="removeReceipt(idx)" class="absolute inset-0 bg-red-600/80 text-white font-black text-xs opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-1">
                                        <i data-lucide="trash-2" class="w-3 h-3"></i> حذف
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 bg-gray-50 p-8 rounded-3xl">
                        <div class="col-span-full font-black text-[#3a2016] flex items-center gap-2 mb-2 text-lg">
                            <i data-lucide="user"></i> بيانات العميل الأساسية للشحن
                        </div>
                        <div class="space-y-1">
                            <label class="text-[11px] font-black text-gray-400 mr-2 uppercase">اسم العميل بالكامل</label>
                            <input v-model="orderForm.client.name" required class="w-full p-3.5 border-2 border-transparent bg-white rounded-2xl shadow-sm focus:border-blue-500 outline-none font-bold">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[11px] font-black text-gray-400 mr-2 uppercase">المدينة / المنطقة</label>
                            <input v-model="orderForm.client.city" required class="w-full p-3.5 border-2 border-transparent bg-white rounded-2xl shadow-sm focus:border-blue-500 outline-none font-bold">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[11px] font-black text-gray-400 mr-2 uppercase">رقم الجوال</label>
                            <input v-model="orderForm.client.phone" @input="orderForm.client.phone = orderForm.client.phone.replace(/\s+/g, '')" required class="w-full p-3.5 border-2 border-transparent bg-white rounded-2xl shadow-sm focus:border-blue-500 outline-none font-bold" dir="ltr">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[11px] font-black text-gray-400 mr-2 uppercase">العنوان بالتفصيل</label>
                            <input v-model="orderForm.client.address" required class="w-full p-3.5 border-2 border-transparent bg-white rounded-2xl shadow-sm focus:border-blue-500 outline-none font-bold">
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div class="flex justify-between items-center border-b pb-4">
                            <h3 class="text-xl font-black text-[#3a2016]">تفاصيل المناشر والمنتجات</h3>
                            <button type="button" @click="addProductRow" class="bg-blue-50 text-blue-600 px-6 py-2 rounded-xl font-black text-sm transition-all hover:bg-blue-100">+ إضافة منتج آخر للطلب</button>
                        </div>
                        
                        <div v-for="(p, index) in orderForm.products" :key="p.id" class="p-8 border-2 border-gray-50 rounded-3xl relative bg-white hover:border-blue-100 transition-all shadow-sm">
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6">
                                <div class="space-y-1 lg:col-span-2">
                                    <label class="text-[10px] font-black text-gray-400 uppercase">اختر المنتج أو الموديل</label>
                                    <div class="flex items-center gap-3">
                                        <div v-if="p.name" class="w-16 h-16 bg-white border border-gray-200 rounded-xl flex items-center justify-center p-1 shrink-0 shadow-sm">
                                            <img :src="`products/${p.name}.webp`" :data-name="p.name"
                                                 onerror="if(!this.getAttribute('data-j')){this.setAttribute('data-j','1'); this.src='products/'+this.getAttribute('data-name')+'.jpg';} else if(!this.getAttribute('data-p')){this.setAttribute('data-p','1'); this.src='products/'+this.getAttribute('data-name')+'.png';} else {this.onerror=null; this.src='logo1.png';}"
                                                 class="w-full h-full object-contain rounded-md">
                                        </div>
                                        <select v-model="p.productId" @change="syncProductData(p)" required class="flex-1 w-full p-3 border rounded-xl bg-gray-50 font-bold text-sm">
                                            <option value="">اختر الموديل من الكتالوج...</option>
                                            <option v-for="item in catalog" :key="item.id" :value="item.id">{{ item.name }} (SAR {{ item.price }})</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[10px] font-black text-gray-400 uppercase">اللون المطلوب</label>
                                    <select v-model="p.color" class="w-full p-3 border rounded-xl bg-gray-50 font-bold text-sm">
                                        <option value="white">أبيض</option>
                                        <option value="black">أسود</option>
                                    </select>
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[10px] font-black text-gray-400 uppercase">الكمية</label>
                                    <input v-model.number="p.count" type="number" min="1" class="w-full p-3 border rounded-xl bg-gray-50 font-bold text-sm text-center">
                                </div>
                                
                                <div class="space-y-2 border-r-2 border-gray-100 pr-4">
                                    <label class="flex items-center gap-2 cursor-pointer mt-1">
                                        <input type="checkbox" v-model="p.hasLighting" class="custom-checkbox">
                                        <span class="text-xs font-black text-gray-700">إضافة إضاءة (+129 ريال)</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox" v-model="p.customDesign" class="custom-checkbox">
                                        <span class="text-xs font-black text-gray-700">طلب تصميم خاص (+50 ريال)</span>
                                    </label>
                                </div>


                                <div class="space-y-1">
                                    <label class="text-[10px] font-black text-gray-400 uppercase">رقم الفيلا / العمارة</label>
                                    <input v-model="p.villaNo" class="w-full p-3 border rounded-xl bg-gray-50 font-bold text-sm">
                                </div>
                                <div class="space-y-1 lg:col-span-2">
                                    <label class="text-[10px] font-black text-gray-400 uppercase">الاسم المخصص على المنشر</label>
                                    <input v-model="p.customName" class="w-full p-3 border rounded-xl bg-gray-50 font-bold text-sm">
                                </div>
                                <div class="lg:col-span-5 space-y-1 mt-2">
                                    <label class="text-[10px] font-black text-gray-400 uppercase">أي ملاحظات خاصة بالتصنيع</label>
                                    <input v-model="p.notes" class="w-full p-3 border rounded-xl bg-gray-50 font-bold text-sm">
                                </div>
                            </div>
                            <button v-if="orderForm.products.length > 1" @click="removeProductRow(index)" type="button" class="absolute -top-3 -left-3 bg-red-500 text-white p-2.5 rounded-full shadow-lg transition-transform hover:scale-110">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex justify-between items-center border-t pt-10">
                        <div class="flex flex-col gap-1">
                            <div class="text-sm text-gray-400 font-bold">مجموع المناشر والألوان (يخضع للخصم): <span class="text-black font-black">{{ calcDiscountableSubTotal }} SAR</span></div>
                            <div v-if="calcNonDiscountableSubTotal > 0" class="text-sm text-gray-400 font-bold">مجموع الإضافات (الإضاءة والتصميم): <span class="text-black font-black">{{ calcNonDiscountableSubTotal }} SAR</span></div>
                            
                            <div v-if="orderForm.discountRate > 0" class="text-sm font-bold text-red-500 mt-1">
                                قيمة الخصم المطبق ({{ orderForm.discountRate }}%) = - {{ calcDiscountValue }} SAR
                            </div>
                            
                            <div class="font-black text-4xl text-green-600 mt-2">{{ calcTotal }} SAR</div>
                            <div v-if="orderForm.discountRate > 0" class="font-bold text-red-500 text-xs mt-1">تنبيه: يتم تطبيق الخصم على أسعار المناشر الأساسية والألوان فقط دون الإضافات.</div>
                        </div>
                        <div class="flex gap-4">
                            <button v-if="editingOrder" type="button" @click="cancelEdit" class="bg-gray-200 px-10 py-4 rounded-2xl font-black text-gray-600 shadow-sm transition-all hover:bg-gray-300">إلغاء التعديل</button>
                            <button type="submit" :disabled="isSaving"
                                    :class="isSuccess ? 'bg-green-600 hover:bg-green-700' : 'bg-[#3a2016] hover:bg-blue-800'"
                                    class="text-white px-16 py-4 rounded-2xl font-black shadow-xl hover:scale-105 active:scale-95 transition-all flex justify-center items-center gap-3 min-w-[280px]">
                                <i v-if="isSuccess" data-lucide="check-circle" class="w-6 h-6 text-white"></i>
                                <i v-else-if="isSaving" data-lucide="loader" class="w-5 h-5 animate-spin"></i>
                                <span>{{ isSuccess ? 'تم الحفظ بنجاح' : (editingOrder ? 'تأكيد التحديث' : 'حفظ الطلب') }}</span>
                            </button>
                        </div>
                    </div>
                </form>
            </section>
        </main>
    </template>
</div>

<script type="module">
    const { createApp, ref, computed, onMounted } = Vue;

    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx8cHHMjfwPrygxjWSSSefPM1YAmpYaPOfQzKJ9IYxEVRcmZ3389uYNvrIggkngRwGA/exec";

    const STATIC_PRICES = {
        1: 345
    };

    const DEFAULT_CATALOG = [
        { id: 'design-1', name: 'design-1', price: 345 }
    ];

    const EMPTY_ORDER_FORM = () => ({
        managerCode: '', discountRate: 0, isPaid: false, receipts: [], orderStatus: false, timestamp: null, customOrderId: '', payOnDelivery: false,
        client: { name: '', city: '', address: '', phone: '+966' },
        products: [{ id: Date.now(), productId: '', name: '', nationalAddress: '', villaNo: '', customName: '', notes: '', count: 1, color: 'white', basePrice: 0, hasLighting: false, customDesign: false }]
    });

    createApp({
        setup() {
            const currentUser = ref(JSON.parse(sessionStorage.getItem('hb_user') || 'null'));
            const loginForm = ref({ username: '', password: '' });
            const loginLoading = ref(false);
            const loginError = ref('');

            const catalog = ref([...DEFAULT_CATALOG]);
            const orderForm = ref(EMPTY_ORDER_FORM());
            const editingOrder = ref(null);
            const receiptInput = ref(null);

            const syncLoading = ref(false);
            const isSaving = ref(false);
            const isSuccess = ref(false);
            const notification = ref(null);

            const calcDiscountableSubTotal = computed(() => {
                return orderForm.value.products.reduce((sum, p) => {
                    let unitPrice = p.basePrice || 0;
                    return sum + (unitPrice * p.count);
                }, 0);
            });

            const calcNonDiscountableSubTotal = computed(() => {
                return orderForm.value.products.reduce((sum, p) => {
                    let additions = 0;
                    if (p.hasLighting) additions += 129;
                    if (p.customDesign) additions += 50;
                    return sum + (additions * p.count);
                }, 0);
            });

            const calcSubTotal = computed(() => calcDiscountableSubTotal.value + calcNonDiscountableSubTotal.value);
            
            const calcDiscountValue = computed(() => {
                return parseFloat(((calcDiscountableSubTotal.value * (orderForm.value.discountRate || 0)) / 100).toFixed(2));
            });

            const calcTotal = computed(() => Math.round(calcDiscountableSubTotal.value - calcDiscountValue.value + calcNonDiscountableSubTotal.value));

            const showNotify = (msg, type = 'success') => {
                notification.value = { msg, type };
                setTimeout(() => notification.value = null, 4000);
                setTimeout(() => lucide.createIcons(), 50);
            };

            const doLogin = async () => {
                if (!loginForm.value.username || !loginForm.value.password) { loginError.value = 'يرجى إدخال البيانات كاملة'; return; }
                loginLoading.value = true; loginError.value = '';
                try {
                    const res = await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST', redirect: 'follow',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'login', username: loginForm.value.username, password: loginForm.value.password })
                    });
                    const data = await res.json();
                    if (data.success && data.user) {
                        currentUser.value = data.user;
                        sessionStorage.setItem('hb_user', JSON.stringify(data.user));
                        cancelEdit(); 
                        syncCatalogFromSheet();
                    } else {
                        loginError.value = 'البيانات المدخلة خاطئة!';
                    }
                } catch (e) {
                    loginError.value = 'خطأ بالاتصال بالسحاب';
                } finally { loginLoading.value = false; }
            };

            const doLogout = () => { currentUser.value = null; sessionStorage.removeItem('hb_user'); };

            const addProductRow = () => orderForm.value.products.push({ id: Date.now(), productId: '', name: '', nationalAddress: '', villaNo: '', customName: '', notes: '', count: 1, color: 'white', basePrice: 0, hasLighting: false, customDesign: false });
            const removeProductRow = (idx) => orderForm.value.products.splice(idx, 1);
            
            const syncProductData = (p) => { 
                const item = catalog.value.find(c => String(c.id) === String(p.productId)); 
                if (item) { p.name = item.name; p.basePrice = item.price; } 
            };
            
            const togglePayment = () => {
                orderForm.value.isPaid = !orderForm.value.isPaid;
            };

            const handleReceiptUpload = (e) => {
                const files = Array.from(e.target.files);
                if (!files.length) return;
                
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const scale = img.width > 400 ? 400 / img.width : 1;
                            canvas.width = img.width * scale; 
                            canvas.height = img.height * scale;
                            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                            orderForm.value.receipts.push(canvas.toDataURL('image/jpeg', 0.6));
                            orderForm.value.isPaid = true; 
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                });

                if (receiptInput.value) receiptInput.value.value = '';
            };

            const removeReceipt = (idx) => orderForm.value.receipts.splice(idx, 1);

            const saveOrder = () => {
                isSaving.value = true;
                const mCode = editingOrder.value ? orderForm.value.managerCode : (currentUser.value?.managerCode || 'XX');
                const orderId = editingOrder.value ? editingOrder.value.orderId : (orderForm.value.customOrderId ? `${mCode}-${orderForm.value.customOrderId}` : `${mCode}-${Math.floor(100000 + Math.random() * 900000)}`);

                const payload = {
                    action: editingOrder.value ? 'update' : 'create', target: 'orders',
                    orderId, managerCode: mCode, discountRate: orderForm.value.discountRate || 0,
                    discountValue: calcDiscountValue.value, subTotal: calcSubTotal.value, totalAmount: calcTotal.value,
                    isPaid: orderForm.value.isPaid, 
                    payOnDelivery: orderForm.value.payOnDelivery,
                    receiptImage: orderForm.value.receipts,
                    orderStatus: orderForm.value.orderStatus,
                    client: JSON.parse(JSON.stringify(orderForm.value.client)),
                    products: JSON.parse(JSON.stringify(orderForm.value.products)).map(p => {
                        let finalUnit = p.basePrice || 0;
                        if(p.hasLighting) finalUnit += 129;
                        if(p.customDesign) finalUnit += 50;
                        p.price = finalUnit;
                        return p;
                    }),
                    timestamp: editingOrder.value ? orderForm.value.timestamp : new Date().toISOString()
                };

                fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST', mode: 'no-cors', 
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                }).then(() => {
                    // Sync fully through cloud locally (Wait for next tab load to fetch, or force sync here)
                    isSaving.value = false;
                    isSuccess.value = true;
                    setTimeout(() => { 
                        isSuccess.value = false; 
                        cancelEdit(); 
                        window.location.href = 'my_orders.html';
                    }, 1200);
                }).catch(e => {
                    isSaving.value = false; showNotify('خطأ فني في الاتصال', 'error');
                });
            };

            const cancelEdit = () => { 
                editingOrder.value = null; 
                if (receiptInput.value) receiptInput.value.value = ''; 
                orderForm.value = EMPTY_ORDER_FORM(); 
                if (currentUser.value && currentUser.value.managerCode) {
                    orderForm.value.managerCode = currentUser.value.managerCode;
                }
            };

            const syncCatalogFromSheet = async () => {
                syncLoading.value = true;
                try {
                    const res = await fetch(GOOGLE_SCRIPT_URL, { redirect: 'follow' });
                    const text = await res.text();
                    const result = JSON.parse(text);
                    let newCat = [...DEFAULT_CATALOG];
                    if (result.catalog?.length > 0) {
                        result.catalog.forEach(r => {
                            let id = String(r['id'] || r['اسم المنتج'] || '');
                            let name = String(r['name'] || r['اسم المنتج'] || '');
                            let price = parseFloat(r['price'] || r['السعر'] || 0);
                            if (id && !newCat.some(c => c.id === id)) newCat.push({ id, name, price });
                        });
                    }
                    catalog.value = newCat;
                    showNotify('تم تحديث البيانات من السحاب');
                } catch(e) { } finally { syncLoading.value = false; }
            };

            onMounted(() => { 
                setTimeout(() => lucide.createIcons(), 500); 
                if (currentUser.value) {
                    const toEdit = localStorage.getItem('orderToEdit');
                    if (toEdit) {
                        const parsed = JSON.parse(toEdit);
                        editingOrder.value = parsed;
                        
                        let loadedReceipts = [];
                        if (parsed.receiptImage) {
                            if (Array.isArray(parsed.receiptImage)) {
                                loadedReceipts = parsed.receiptImage;
                            } else if (typeof parsed.receiptImage === 'string') {
                                loadedReceipts = parsed.receiptImage.split('|||').filter(x => x.trim().length > 0);
                            }
                        }

                        orderForm.value = {
                            managerCode: parsed.managerCode, 
                            discountRate: parsed.discountRate || 0, 
                            isPaid: parsed.isPaid, 
                            receipts: loadedReceipts,
                            orderStatus: parsed.orderStatus || false,
                            customOrderId: '',
                            payOnDelivery: parsed.payOnDelivery || false,
                            timestamp: parsed.timestamp, 
                            client: JSON.parse(JSON.stringify(parsed.client)), 
                            products: JSON.parse(JSON.stringify(parsed.products)).map(p => {
                                p.hasLighting = p.hasLighting === true || String(p.hasLighting) === "نعم";
                                p.customDesign = p.customDesign === true || String(p.customDesign) === "نعم";
                                if (!p.basePrice) {
                                    let deducted = p.price;
                                    if(p.hasLighting) deducted -= 129;
                                    if(p.customDesign) deducted -= 50;
                                    p.basePrice = deducted;
                                }
                                return p;
                            })
                        };
                        localStorage.removeItem('orderToEdit');
                    } else {
                        cancelEdit(); 
                    }
                    syncCatalogFromSheet(); 
                }
            });

            return {
                currentUser, loginForm, loginLoading, loginError, doLogin, doLogout,
                catalog, orderForm, editingOrder, receiptInput, syncLoading, isSaving, isSuccess, notification,
                calcDiscountableSubTotal, calcNonDiscountableSubTotal, calcSubTotal, calcDiscountValue, calcTotal,
                addProductRow, removeProductRow, syncProductData, handleReceiptUpload, removeReceipt, togglePayment,
                saveOrder, cancelEdit, syncCatalogFromSheet
            };
        }
    }).mount('#app');
</script>
</body>
</html>
